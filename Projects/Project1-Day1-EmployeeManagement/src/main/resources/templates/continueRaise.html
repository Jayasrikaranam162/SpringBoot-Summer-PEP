<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Salary Updated</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:30px;

background:linear-gradient(-45deg,#f7971e,#ffd200,#43cea2,#185a9d);

background-size:400% 400%;

animation:bgMove 12s ease infinite;

}

@keyframes bgMove{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

.card-box{

width:700px;

padding:45px;

text-align:center;

border-radius:25px;

background:rgba(255,255,255,.18);

backdrop-filter:blur(18px);

box-shadow:0 15px 35px rgba(0,0,0,.25);

animation:fade .8s;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(40px);

}

to{

opacity:1;
transform:translateY(0);

}

}

.icon{

font-size:85px;

color:white;

animation:pulse 1.5s infinite;

}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.12);
}

100%{
transform:scale(1);
}

}

h2{

color:white;

font-weight:700;

margin-top:15px;

}

p{

color:white;

font-size:18px;

opacity:.95;

margin-top:15px;

}

.question{

margin-top:35px;

font-size:20px;

font-weight:600;

color:white;

}

.btn{

padding:13px 35px;

font-size:17px;

font-weight:600;

border-radius:14px;

transition:.3s;

margin:10px;

}

.btn:hover{

transform:translateY(-4px);

box-shadow:0 10px 20px rgba(0,0,0,.25);

}

.info-box{

margin-top:30px;

padding:15px;

border-radius:15px;

background:rgba(255,255,255,.15);

color:white;

font-size:15px;

}

</style>

</head>

<body>

<div class="card-box">

<div class="icon">

<i class="bi bi-cash-stack"></i>

</div>

<h2>

Salary Updated Successfully!

</h2>

<p>

The employee's salary has been updated successfully in the system.

</p>

<div class="info-box">

<i class="bi bi-check-circle-fill"></i>

The updated salary will be reflected when you view the employee records.

</div>

<div class="question">

Would you like to update another employee's salary?

</div>

<div class="mt-4">

<a href="/raise-form" class="btn btn-success">

<i class="bi bi-arrow-repeat"></i>

YES

</a>

<a href="/" class="btn btn-danger">

<i class="bi bi-house-door-fill"></i>

NO

</a>

</div>

</div>

</body>

</html>
