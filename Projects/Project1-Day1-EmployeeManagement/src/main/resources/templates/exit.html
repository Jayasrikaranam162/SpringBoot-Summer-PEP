<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Thank You</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:30px;

background:linear-gradient(-45deg,#667eea,#764ba2,#6a11cb,#2575fc);

background-size:400% 400%;

animation:bgMove 12s ease infinite;

overflow:hidden;

}

@keyframes bgMove{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

.card-box{

width:700px;

padding:50px;

text-align:center;

border-radius:28px;

background:rgba(255,255,255,.18);

backdrop-filter:blur(18px);

box-shadow:0 15px 35px rgba(0,0,0,.25);

animation:fade .9s;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(40px);

}

to{

opacity:1;

transform:translateY(0);

}

}

.icon{

font-size:90px;

color:white;

animation:heartbeat 1.5s infinite;

}

@keyframes heartbeat{

0%{
transform:scale(1);
}

25%{
transform:scale(1.1);
}

50%{
transform:scale(1);
}

75%{
transform:scale(1.1);
}

100%{
transform:scale(1);
}

}

h1{

color:white;

font-size:42px;

font-weight:700;

margin-top:15px;

}

h4{

color:white;

font-weight:400;

margin-top:18px;

line-height:1.8;

opacity:.95;

}

.footer{

margin-top:30px;

color:white;

opacity:.85;

font-size:15px;

}

.btn-home{

margin-top:35px;

padding:14px 40px;

font-size:18px;

font-weight:600;

border-radius:14px;

transition:.3s;

}

.btn-home:hover{

transform:translateY(-4px);

box-shadow:0 10px 20px rgba(0,0,0,.25);

}

</style>

</head>

<body>

<div class="card-box">

<div class="icon">

<i class="bi bi-heart-fill"></i>

</div>

<h1>

Thank You!

</h1>

<h4>

Thank you for using the <b>Employee Management System</b>.

<br><br>

We hope your experience was smooth, simple and enjoyable.

</h4>

<a href="/" class="btn btn-light btn-home">

<i class="bi bi-house-door-fill"></i>

Go To Home

</a>

<div class="footer">

Made with ❤️ using Spring Boot, Thymeleaf & Bootstrap

</div>

</div>

</body>

</html>
