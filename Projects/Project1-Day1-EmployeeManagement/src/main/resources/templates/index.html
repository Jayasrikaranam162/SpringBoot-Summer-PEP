<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<title>Employee Management System</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<!-- Google Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(-45deg,#4facfe,#00f2fe,#43e97b,#38f9d7);

background-size:400% 400%;

animation:bgMove 12s ease infinite;

overflow:hidden;

}

@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.card-box{

width:700px;

padding:45px;

border-radius:25px;

background:rgba(255,255,255,.18);

backdrop-filter:blur(15px);

box-shadow:0 10px 35px rgba(0,0,0,.25);

animation:fadeIn 1s;

}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.logo{

font-size:70px;
color:white;

}

.title{

font-size:36px;

font-weight:700;

color:white;

margin-top:10px;

}

.subtitle{

font-size:18px;

color:white;

opacity:.9;

margin-bottom:35px;

}

.menu-btn{

width:100%;

padding:18px;

margin-top:18px;

font-size:20px;

font-weight:600;

border:none;

border-radius:15px;

transition:.35s;

text-align:left;

}

.menu-btn i{

font-size:24px;

margin-right:15px;

}

.menu-btn:hover{

transform:translateY(-5px) scale(1.02);

box-shadow:0 10px 20px rgba(0,0,0,.25);

}

.footer{

margin-top:35px;

color:white;

font-size:15px;

opacity:.9;

}

</style>

</head>

<body>

<div class="card-box text-center">

<div class="logo">
<i class="bi bi-people-fill"></i>
</div>

<div class="title">
Employee Management System
</div>

<div class="subtitle">
Manage employees efficiently with a modern dashboard
</div>

<a href="/create-form"
class="btn btn-success menu-btn">

<i class="bi bi-person-plus-fill"></i>

Create Employee

</a>

<a href="/display"
class="btn btn-primary menu-btn">

<i class="bi bi-table"></i>

Display Employees

</a>

<a href="/raise-form"
class="btn btn-warning menu-btn">

<i class="bi bi-cash-stack"></i>

Raise Salary

</a>

<a href="/exit"
class="btn btn-danger menu-btn">

<i class="bi bi-box-arrow-right"></i>

Exit

</a>

<div class="footer">

Designed using Spring Boot + Thymeleaf + Bootstrap

</div>

</div>

</body>

</html>
