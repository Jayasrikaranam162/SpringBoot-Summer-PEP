<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Employee Saved</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(-45deg,#11998e,#38ef7d,#56ab2f,#a8e063);

background-size:400% 400%;

animation:bgMove 12s ease infinite;

padding:30px;

}

@keyframes bgMove{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

.card-box{

width:650px;

padding:45px;

border-radius:25px;

background:rgba(255,255,255,.18);

backdrop-filter:blur(16px);

box-shadow:0 15px 35px rgba(0,0,0,.25);

text-align:center;

animation:fade .8s;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.success{

font-size:85px;

color:white;

animation:bounce 1.4s infinite;

}

@keyframes bounce{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-12px);
}

}

h2{

color:white;

font-weight:700;

margin-top:15px;

}

p{

color:white;

font-size:18px;

opacity:.95;

margin-top:15px;

}

.question{

margin-top:35px;

font-size:20px;

font-weight:600;

color:white;

}

.btn{

padding:13px 35px;

font-size:17px;

font-weight:600;

border-radius:14px;

transition:.3s;

margin:10px;

}

.btn:hover{

transform:translateY(-4px);

box-shadow:0 10px 20px rgba(0,0,0,.25);

}

</style>

</head>

<body>

<div class="card-box">

<div class="success">

<i class="bi bi-check-circle-fill"></i>

</div>

<h2>

Employee Saved Successfully!

</h2>

<p>

The employee information has been stored successfully.

</p>

<div class="question">

Would you like to add another employee?

</div>

<div class="mt-4">

<a href="/create-form" class="btn btn-success">

<i class="bi bi-person-plus-fill"></i>

YES

</a>

<a href="/" class="btn btn-danger">

<i class="bi bi-house-door-fill"></i>

NO

</a>

</div>

</div>

</body>

</html>
