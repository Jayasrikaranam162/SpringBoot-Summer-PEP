<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Raise Salary</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:30px;

background:linear-gradient(-45deg,#f7971e,#ffd200,#ffb347,#ffcc70);

background-size:400% 400%;

animation:bgMove 12s ease infinite;

}

@keyframes bgMove{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

.card-box{

width:700px;

padding:40px;

border-radius:25px;

background:rgba(255,255,255,.18);

backdrop-filter:blur(16px);

box-shadow:0 15px 35px rgba(0,0,0,.25);

animation:fade .8s;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(40px);

}

to{

opacity:1;
transform:translateY(0);

}

}

.title{

font-size:34px;

font-weight:700;

text-align:center;

color:white;

}

.subtitle{

text-align:center;

color:white;

opacity:.9;

margin-bottom:30px;

}

label{

font-weight:600;

color:white;

margin-bottom:8px;

}

.input-group-text{

background:white;

border:none;

border-radius:14px 0 0 14px;

}

.form-control{

border:none;

border-radius:0 14px 14px 0;

padding:14px;

transition:.3s;

}

.form-control:focus{

box-shadow:0 0 15px rgba(255,255,255,.6);

transform:scale(1.02);

}

.btn{

padding:13px 35px;

font-size:17px;

font-weight:600;

border-radius:14px;

transition:.3s;

}

.btn:hover{

transform:translateY(-3px);

box-shadow:0 10px 20px rgba(0,0,0,.25);

}

.alert{

border-radius:12px;

}

.tip{

margin-top:25px;

padding:15px;

background:rgba(255,255,255,.2);

border-radius:12px;

color:white;

font-size:15px;

}

</style>

</head>

<body>

<div class="card-box">

<div class="title">

<i class="bi bi-cash-coin"></i>

Raise Employee Salary

</div>

<div class="subtitle">

Increase salary quickly and securely

</div>

<div class="alert alert-danger"
th:if="${message}"
th:text="${message}">
</div>

<form action="/raiseSalary" method="post">

<div class="mb-4">

<label>

Employee Name

</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-person-fill"></i>

</span>

<input
type="text"
name="name"
class="form-control"
placeholder="Enter Employee Name"
required>

</div>

</div>

<div class="mb-4">

<label>

Increase Percentage

</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-percent"></i>

</span>

<input
type="number"
name="percentage"
class="form-control"
placeholder="Enter value between 1 and 10"
min="1"
max="10"
required>

</div>

</div>

<div class="text-center">

<button
type="submit"
class="btn btn-warning">

<i class="bi bi-arrow-up-circle-fill"></i>

Increase Salary

</button>

&nbsp;&nbsp;

<a
href="/"
class="btn btn-secondary">

<i class="bi bi-arrow-left-circle-fill"></i>

Back

</a>

</div>

<div class="tip">

<i class="bi bi-lightbulb-fill"></i>

Only values between <b>1%</b> and <b>10%</b> are allowed for salary increment.

</div>

</form>

</div>

</body>

</html>
