<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employees | SAMS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="main-content">

    <div th:replace="~{fragments/topbar :: topbar}"></div>

    <div class="section-card">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h4 class="mb-0">Employees</h4>
                <small class="text-muted">Manage employee records and department mapping</small>
            </div>

            <a href="/ui/employees/add" class="btn btn-primary">
                <i class="bi bi-person-plus"></i> Add Employee
            </a>
        </div>

        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>Code</th>
                <th>Full Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Designation</th>
                <th>Department</th>
                <th>Status</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="emp : ${employees}">
                <td th:text="${emp.employeeId}"></td>
                <td th:text="${emp.employeeCode}"></td>
                <td th:text="${emp.fullName}"></td>
                <td th:text="${emp.email}"></td>
                <td th:text="${emp.phone}"></td>
                <td th:text="${emp.designation}"></td>
                <td th:text="${emp.department != null ? emp.department.departmentName : 'N/A'}"></td>
                <td>
                    <span class="status-badge badge-success" th:text="${emp.status}"></span>
                </td>

                <td class="text-end">
                    <a th:href="@{'/ui/employees/edit/' + ${emp.employeeId}}" class="btn btn-sm btn-outline-primary">
                        <i class="bi bi-pencil"></i>
                    </a>

                    <a th:href="@{'/ui/employees/delete/' + ${emp.employeeId}}"
                       class="btn btn-sm btn-outline-danger"
                       onclick="return confirm('Are you sure you want to delete this employee?')">
                        <i class="bi bi-trash"></i>
                    </a>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(employees)}">
                <td colspan="9" class="text-center text-muted py-4">
                    No employees found.
                </td>
            </tr>
            </tbody>
        </table>

    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

</div>
<script th:src="@{/js/common.js}"></script>
</body>
</html>
