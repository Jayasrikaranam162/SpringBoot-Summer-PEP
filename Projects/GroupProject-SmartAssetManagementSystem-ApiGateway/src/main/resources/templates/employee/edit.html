<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Employee | SAMS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="main-content">

    <div th:replace="~{fragments/topbar :: topbar}"></div>

    <div class="section-card">

        <div class="mb-4">
            <h4 class="mb-0">Edit Employee</h4>
            <small class="text-muted">Update employee details and department mapping</small>
        </div>

        <form th:action="@{'/ui/employees/edit/' + ${employee.employeeId}}" th:object="${employee}" method="post">

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label">Employee Code</label>
                    <input type="text" th:field="*{employeeCode}" class="form-control">
                    <small class="text-danger" th:if="${#fields.hasErrors('employeeCode')}" th:errors="*{employeeCode}"></small>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" th:field="*{fullName}" class="form-control">
                    <small class="text-danger" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></small>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" th:field="*{email}" class="form-control">
                    <small class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Phone</label>
                    <input type="text" th:field="*{phone}" class="form-control">
                    <small class="text-danger" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></small>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Designation</label>
                    <input type="text" th:field="*{designation}" class="form-control">
                    <small class="text-danger" th:if="${#fields.hasErrors('designation')}" th:errors="*{designation}"></small>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Joining Date</label>
                    <input type="date" th:field="*{joiningDate}" class="form-control">
                    <small class="text-danger" th:if="${#fields.hasErrors('joiningDate')}" th:errors="*{joiningDate}"></small>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Department</label>
                    <select name="departmentId" class="form-select" required>
                        <option th:each="dept : ${departments}"
                                th:value="${dept.departmentId}"
                                th:text="${dept.departmentName}"
                                th:selected="${employee.department != null and employee.department.departmentId == dept.departmentId}">
                        </option>
                    </select>
                </div>

            </div>

            <div class="d-flex gap-2 mt-3">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> Update Employee
                </button>

                <a href="/ui/employees" class="btn btn-outline-secondary">
                    Cancel
                </a>
            </div>

        </form>

    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

</div>

</body>
</html>
