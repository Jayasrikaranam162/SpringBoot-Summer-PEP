<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>New Maintenance | SAMS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="main-content">

    <div th:replace="~{fragments/topbar :: topbar}"></div>

    <div class="section-card">

        <div class="mb-4">
            <h4 class="mb-0">Create Maintenance Request</h4>
            <small class="text-muted">Send an asset for repair or maintenance</small>
        </div>

        <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <form th:action="@{/ui/maintenance/add}" th:object="${maintenance}" method="post">

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label">Asset</label>
                    <select name="assetId" class="form-select" required>
                        <option value="">-- Select Asset --</option>
                        <option th:each="asset : ${assets}"
                                th:value="${asset.assetId}"
                                th:text="${asset.assetCode + ' - ' + asset.assetName + ' (' + asset.assetStatus + ')'}">
                        </option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Vendor</label>
                    <select name="vendorId" class="form-select" required>
                        <option value="">-- Select Vendor --</option>
                        <option th:each="vendor : ${vendors}"
                                th:value="${vendor.vendorId}"
                                th:text="${vendor.vendorName}">
                        </option>
                    </select>
                </div>

                <div class="col-md-12 mb-3">
                    <label class="form-label">Issue Description</label>
                    <textarea th:field="*{issueDescription}" class="form-control" rows="3"></textarea>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Maintenance Cost</label>
                    <input type="number" th:field="*{maintenanceCost}" class="form-control">
                </div>

                <div class="col-md-12 mb-3">
                    <label class="form-label">Remarks</label>
                    <textarea th:field="*{remarks}" class="form-control" rows="3"></textarea>
                </div>

            </div>

            <div class="d-flex gap-2 mt-3">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> Create Request
                </button>

                <a href="/ui/maintenance" class="btn btn-outline-secondary">Cancel</a>
            </div>

        </form>

    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

</div>

</body>
</html>
