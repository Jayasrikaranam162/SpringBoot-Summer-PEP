<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Add Category | SAMS</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

	<div th:replace="~{fragments/sidebar :: sidebar}"></div>

	<div class="main-content">

		<div th:replace="~{fragments/topbar :: topbar}"></div>

		<div class="section-card">

			<div class="mb-4">
				<h4 class="mb-0">Add Asset Category</h4>
				<small class="text-muted">Create a new asset category</small>
			</div>
			<div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

			<form th:action="@{/ui/categories/add}" th:object="${category}" method="post">

				<div class="mb-3">
					<label class="form-label">Category Name</label>
					<input type="text" th:field="*{categoryName}" class="form-control">
				</div>

				<div class="mb-3">
					<label class="form-label">Description</label>
					<textarea th:field="*{description}" class="form-control" rows="4"></textarea>
				</div>

				<div class="d-flex gap-2">
					<button type="submit" class="btn btn-primary">
						<i class="bi bi-save"></i> Save Category
					</button>

					<a href="/ui/categories" class="btn btn-outline-secondary">
						Cancel
					</a>
				</div>

			</form>

		</div>

		<div th:replace="~{fragments/footer :: footer}"></div>

	</div>

</body>

</html>
