<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Categories | SAMS</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

	<div th:replace="~{fragments/sidebar :: sidebar}"></div>

	<div class="main-content">

		<div th:replace="~{fragments/topbar :: topbar}"></div>

		<div class="section-card">

			<div class="d-flex justify-content-between align-items-center mb-3">
				<div>
					<h4 class="mb-0">Asset Categories</h4>
					<small class="text-muted">Manage asset classification like laptop, desktop, monitor</small>
				</div>

				<a href="/ui/categories/add" class="btn btn-primary">
					<i class="bi bi-plus-circle"></i> Add Category
				</a>
			</div>
			<div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>
			<table class="table table-hover align-middle">
				<thead>
					<tr>
						<th>ID</th>
						<th>Category Name</th>
						<th>Description</th>
						<th>Status</th>
						<th>Created At</th>
						<th class="text-end">Actions</th>
					</tr>
				</thead>

				<tbody>
					<tr th:each="cat : ${categories}">
						<td th:text="${cat.categoryId}"></td>
						<td th:text="${cat.categoryName}"></td>
						<td th:text="${cat.description}"></td>
						<td>
							<span class="status-badge badge-success" th:text="${cat.status}"></span>
						</td>
						<td th:text="${cat.createdAt}"></td>
						<td class="text-end">
							<a th:href="@{'/ui/categories/edit/' + ${cat.categoryId}}"
								class="btn btn-sm btn-outline-primary">
								<i class="bi bi-pencil"></i>
							</a>

							<a th:href="@{'/ui/categories/delete/' + ${cat.categoryId}}"
								class="btn btn-sm btn-outline-danger"
								onclick="return confirm('Are you sure you want to delete this category?')">
								<i class="bi bi-trash"></i>
							</a>
						</td>
					</tr>

					<tr th:if="${#lists.isEmpty(categories)}">
						<td colspan="6" class="text-center text-muted py-4">
							No categories found.
						</td>
					</tr>
				</tbody>
			</table>

		</div>

		<div th:replace="~{fragments/footer :: footer}"></div>

	</div>
	<script th:src="@{/js/common.js}"></script>
</body>

</html>
