<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Resolve Damage Report | SAMS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="main-content">

    <div th:replace="~{fragments/topbar :: topbar}"></div>

    <div class="section-card">

        <div class="mb-4">
            <h4 class="mb-0">Resolve Damage Report</h4>
            <small class="text-muted">Review and update damage report status</small>
        </div>

        <div class="mb-3">
            <label class="form-label">Asset</label>
            <input type="text" class="form-control"
                   th:value="${report.asset != null ? report.asset.assetName : 'N/A'}"
                   readonly>
        </div>

        <div class="mb-3">
            <label class="form-label">Reported By</label>
            <input type="text" class="form-control"
                   th:value="${report.employee != null ? report.employee.fullName : 'N/A'}"
                   readonly>
        </div>

        <div class="mb-3">
            <label class="form-label">Damage Description</label>
            <textarea class="form-control" rows="3" readonly th:text="${report.description}"></textarea>
        </div>

        <form th:action="@{'/ui/damage-reports/resolve/' + ${report.damageReportId}}" method="post">

            <div class="mb-3">
                <label class="form-label">Report Status</label>
                <select name="status" class="form-select" required>
                    <option value="PENDING" th:selected="${report.reportStatus == 'PENDING'}">PENDING</option>
                    <option value="RESOLVED" th:selected="${report.reportStatus == 'RESOLVED'}">RESOLVED</option>
                    <option value="REJECTED" th:selected="${report.reportStatus == 'REJECTED'}">REJECTED</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Admin Remarks</label>
                <textarea name="adminRemarks" class="form-control" rows="4"
                          th:text="${report.adminRemarks}"></textarea>
            </div>

            <div class="d-flex gap-2 mt-3">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> Update Report
                </button>

                <a href="/ui/damage-reports" class="btn btn-outline-secondary">Cancel</a>
            </div>

        </form>

    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

</div>

</body>
</html>
