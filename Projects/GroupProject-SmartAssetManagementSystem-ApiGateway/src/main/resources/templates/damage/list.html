<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Damage Reports | SAMS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="main-content">

    <div th:replace="~{fragments/topbar :: topbar}"></div>

    <div class="section-card">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h4 class="mb-0">Damage Reports</h4>
                <small class="text-muted">Track damaged assets and resolution status</small>
            </div>

            <a href="/ui/damage-reports/add" class="btn btn-primary">
                <i class="bi bi-exclamation-triangle"></i> Report Damage
            </a>
        </div>

        <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>Asset</th>
                <th>Employee</th>
                <th>Description</th>
                <th>Damage Date</th>
                <th>Status</th>
                <th>Admin Remarks</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="report : ${reports}">
                <td th:text="${report.damageReportId}"></td>
                <td th:text="${report.asset != null ? report.asset.assetName : 'N/A'}"></td>
                <td th:text="${report.employee != null ? report.employee.fullName : 'N/A'}"></td>
                <td th:text="${report.description}"></td>
                <td th:text="${report.damageDate}"></td>

                <td>
                    <span th:if="${report.reportStatus == 'PENDING'}"
                          class="status-badge badge-warning"
                          th:text="${report.reportStatus}">
                    </span>

                    <span th:if="${report.reportStatus == 'RESOLVED'}"
                          class="status-badge badge-success"
                          th:text="${report.reportStatus}">
                    </span>

                    <span th:if="${report.reportStatus == 'REJECTED'}"
                          class="status-badge badge-danger"
                          th:text="${report.reportStatus}">
                    </span>
                </td>

                <td th:text="${report.adminRemarks != null ? report.adminRemarks : 'N/A'}"></td>

                <td class="text-end">
                    <a th:href="@{'/ui/damage-reports/resolve/' + ${report.damageReportId}}"
                       class="btn btn-sm btn-outline-success">
                        <i class="bi bi-check2-circle"></i>
                    </a>

                    <a th:href="@{'/ui/damage-reports/delete/' + ${report.damageReportId}}"
                       class="btn btn-sm btn-outline-danger"
                       onclick="return confirm('Are you sure you want to delete this damage report?')">
                        <i class="bi bi-trash"></i>
                    </a>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(reports)}">
                <td colspan="8" class="text-center text-muted py-4">
                    No damage reports found.
                </td>
            </tr>
            </tbody>
        </table>

    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

</div>
<script th:src="@{/js/common.js}"></script>
</body>
</html>
