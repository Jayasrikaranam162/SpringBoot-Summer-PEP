<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Vendors | SAMS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="main-content">

    <div th:replace="~{fragments/topbar :: topbar}"></div>

    <div class="section-card">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h4 class="mb-0">Vendors</h4>
                <small class="text-muted">Manage asset suppliers and service partners</small>
            </div>

            <a href="/ui/vendors/add" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> Add Vendor
            </a>
        </div>

        <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>Vendor Name</th>
                <th>Contact Person</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Address</th>
                <th>Status</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="vendor : ${vendors}">
                <td th:text="${vendor.vendorId}"></td>
                <td th:text="${vendor.vendorName}"></td>
                <td th:text="${vendor.contactPerson}"></td>
                <td th:text="${vendor.email}"></td>
                <td th:text="${vendor.phone}"></td>
                <td th:text="${vendor.address}"></td>
                <td>
                    <span class="status-badge badge-success" th:text="${vendor.status}"></span>
                </td>
                <td class="text-end">
                    <a th:href="@{'/ui/vendors/edit/' + ${vendor.vendorId}}" class="btn btn-sm btn-outline-primary">
                        <i class="bi bi-pencil"></i>
                    </a>

                    <a th:href="@{'/ui/vendors/delete/' + ${vendor.vendorId}}"
                       class="btn btn-sm btn-outline-danger"
                       onclick="return confirm('Are you sure you want to delete this vendor?')">
                        <i class="bi bi-trash"></i>
                    </a>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(vendors)}">
                <td colspan="8" class="text-center text-muted py-4">
                    No vendors found.
                </td>
            </tr>
            </tbody>
        </table>

    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

</div>

</body>
</html>
