<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SAMS Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center" style="height:100vh;">

    <div class="card shadow p-4" style="width:400px; border-radius:16px;">

        <h3 class="text-center mb-1">SAMS</h3>
        <p class="text-center text-muted mb-4">Smart Asset Management System</p>

        <div class="alert alert-danger" th:if="${param.error}">
            Invalid username or password
        </div>

        <div class="alert alert-success" th:if="${param.logout}">
            Logged out successfully
        </div>

        <form th:action="@{/login}" method="post">

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Login
            </button>

        </form>

    </div>

</div>

</body>
</html>
