<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Assignments | SAMS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="main-content">

    <div th:replace="~{fragments/topbar :: topbar}"></div>

    <div class="section-card">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h4 class="mb-0">Asset Assignments</h4>
                <small class="text-muted">Track assigned and returned assets</small>
            </div>

            <a href="/ui/assignments/add" class="btn btn-primary">
                <i class="bi bi-arrow-left-right"></i> Assign Asset
            </a>
        </div>

        <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>Asset</th>
                <th>Employee</th>
                <th>Assigned Date</th>
                <th>Expected Return</th>
                <th>Actual Return</th>
                <th>Status</th>
                <th>Remarks</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="assignment : ${assignments}">
                <td th:text="${assignment.assignmentId}"></td>
                <td th:text="${assignment.asset != null ? assignment.asset.assetName : 'N/A'}"></td>
                <td th:text="${assignment.employee != null ? assignment.employee.fullName : 'N/A'}"></td>
                <td th:text="${assignment.assignedDate}"></td>
                <td th:text="${assignment.expectedReturnDate}"></td>
                <td th:text="${assignment.actualReturnDate != null ? assignment.actualReturnDate : 'Pending'}"></td>
                <td>
                    <span th:if="${assignment.assignmentStatus == 'ASSIGNED'}"
                          class="status-badge badge-warning"
                          th:text="${assignment.assignmentStatus}">
                    </span>

                    <span th:if="${assignment.assignmentStatus == 'RETURNED'}"
                          class="status-badge badge-success"
                          th:text="${assignment.assignmentStatus}">
                    </span>
                </td>
                <td th:text="${assignment.remarks}"></td>

                <td class="text-end">
                    <a th:if="${assignment.assignmentStatus == 'ASSIGNED'}"
                       th:href="@{'/ui/assignments/return/' + ${assignment.assignmentId}}"
                       class="btn btn-sm btn-outline-success"
                       onclick="return confirm('Mark this asset as returned?')">
                        <i class="bi bi-arrow-return-left"></i>
                    </a>

                    <a th:href="@{'/ui/assignments/delete/' + ${assignment.assignmentId}}"
                       class="btn btn-sm btn-outline-danger"
                       onclick="return confirm('Are you sure you want to delete this assignment record?')">
                        <i class="bi bi-trash"></i>
                    </a>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(assignments)}">
                <td colspan="9" class="text-center text-muted py-4">
                    No assignment records found.
                </td>
            </tr>
            </tbody>
        </table>

    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

</div>
<script th:src="@{/js/common.js}"></script>
</body>
</html>
