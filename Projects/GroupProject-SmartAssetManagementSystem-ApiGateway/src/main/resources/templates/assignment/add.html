<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Assign Asset | SAMS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="main-content">

    <div th:replace="~{fragments/topbar :: topbar}"></div>

    <div class="section-card">

        <div class="mb-4">
            <h4 class="mb-0">Assign Asset</h4>
            <small class="text-muted">Assign available company asset to an employee</small>
        </div>

        <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <form th:action="@{/ui/assignments/add}" th:object="${assignment}" method="post">

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label">Asset</label>
                    <select name="assetId" class="form-select" required>
                        <option value="">-- Select Asset --</option>
                        <option th:each="asset : ${assets}"
                                th:value="${asset.assetId}"
                                th:text="${asset.assetCode + ' - ' + asset.assetName + ' (' + asset.assetStatus + ')'}">
                        </option>
                    </select>
                    <small class="text-muted">Only AVAILABLE assets can be assigned.</small>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Employee</label>
                    <select name="employeeId" class="form-select" required>
                        <option value="">-- Select Employee --</option>
                        <option th:each="emp : ${employees}"
                                th:value="${emp.employeeId}"
                                th:text="${emp.employeeCode + ' - ' + emp.fullName}">
                        </option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Expected Return Date</label>
                    <input type="date" th:field="*{expectedReturnDate}" class="form-control">
                </div>

                <div class="col-md-12 mb-3">
                    <label class="form-label">Remarks</label>
                    <textarea th:field="*{remarks}" class="form-control" rows="3"></textarea>
                </div>

            </div>

            <div class="d-flex gap-2 mt-3">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> Assign Asset
                </button>

                <a href="/ui/assignments" class="btn btn-outline-secondary">Cancel</a>
            </div>

        </form>

    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

</div>

</body>
</html>
