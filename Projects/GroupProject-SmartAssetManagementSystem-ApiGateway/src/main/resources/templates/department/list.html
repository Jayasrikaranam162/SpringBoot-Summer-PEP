<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Departments | SAMS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="main-content">
    <div th:replace="~{fragments/topbar :: topbar}"></div>

    <div class="section-card">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h4 class="mb-0">Departments</h4>
                <small class="text-muted">Manage organization departments</small>
            </div>

            <a href="/ui/departments/add" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> Add Department
            </a>
        </div>

        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>Department Name</th>
                <th>Description</th>
                <th>Status</th>
                <th>Created At</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="dept : ${departments}">
                <td th:text="${dept.departmentId}"></td>
                <td th:text="${dept.departmentName}"></td>
                <td th:text="${dept.description}"></td>
                <td>
                    <span class="status-badge badge-success" th:text="${dept.status}"></span>
                </td>
                <td th:text="${dept.createdAt}"></td>
                <td class="text-end">
                    <a th:href="@{'/ui/departments/edit/' + ${dept.departmentId}}" class="btn btn-sm btn-outline-primary">
                        <i class="bi bi-pencil"></i>
                    </a>

                    <a th:href="@{'/ui/departments/delete/' + ${dept.departmentId}}"
                       class="btn btn-sm btn-outline-danger"
                       onclick="return confirm('Are you sure you want to delete this department?')">
                        <i class="bi bi-trash"></i>
                    </a>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(departments)}">
                <td colspan="6" class="text-center text-muted py-4">
                    No departments found.
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</div>
<script th:src="@{/js/common.js}"></script>
</body>
</html>
