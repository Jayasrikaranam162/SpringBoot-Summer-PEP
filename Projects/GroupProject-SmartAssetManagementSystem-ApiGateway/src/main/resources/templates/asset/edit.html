<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Asset | SAMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="main-content">
    <div th:replace="~{fragments/topbar :: topbar}"></div>

    <div class="section-card">
        <div class="mb-4">
            <h4 class="mb-0">Edit Asset</h4>
            <small class="text-muted">Update asset inventory details</small>
        </div>

        <form th:action="@{'/ui/assets/edit/' + ${asset.assetId}}" th:object="${asset}" method="post">
            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label">Asset Code</label>
                    <input type="text" th:field="*{assetCode}" class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Asset Name</label>
                    <input type="text" th:field="*{assetName}" class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Serial Number</label>
                    <input type="text" th:field="*{serialNumber}" class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Brand</label>
                    <input type="text" th:field="*{brand}" class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Model</label>
                    <input type="text" th:field="*{model}" class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Purchase Cost</label>
                    <input type="number" th:field="*{purchaseCost}" class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Purchase Date</label>
                    <input type="date" th:field="*{purchaseDate}" class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Warranty Expiry Date</label>
                    <input type="date" th:field="*{warrantyExpiryDate}" class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Asset Status</label>
                    <select th:field="*{assetStatus}" class="form-select">
                        <option value="AVAILABLE">AVAILABLE</option>
                        <option value="ASSIGNED">ASSIGNED</option>
                        <option value="UNDER_MAINTENANCE">UNDER_MAINTENANCE</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Condition Status</label>
                    <select th:field="*{conditionStatus}" class="form-select">
                        <option value="GOOD">GOOD</option>
                        <option value="DAMAGED">DAMAGED</option>
                        <option value="REPAIRED">REPAIRED</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Category</label>
                    <select name="categoryId" class="form-select" required>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.categoryId}"
                                th:text="${cat.categoryName}"
                                th:selected="${asset.category != null and asset.category.categoryId == cat.categoryId}">
                        </option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Vendor</label>
                    <select name="vendorId" class="form-select" required>
                        <option th:each="vendor : ${vendors}"
                                th:value="${vendor.vendorId}"
                                th:text="${vendor.vendorName}"
                                th:selected="${asset.vendor != null and asset.vendor.vendorId == vendor.vendorId}">
                        </option>
                    </select>
                </div>

            </div>

            <div class="d-flex gap-2 mt-3">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> Update Asset
                </button>

                <a href="/ui/assets" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</div>

</body>
</html>
