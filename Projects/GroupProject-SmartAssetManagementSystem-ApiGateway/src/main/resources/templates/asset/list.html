<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Assets | SAMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="main-content">
    <div th:replace="~{fragments/topbar :: topbar}"></div>

    <div class="section-card">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h4 class="mb-0">Assets</h4>
                <small class="text-muted">Manage company assets and inventory</small>
            </div>

            <a href="/ui/assets/add" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> Add Asset
            </a>
        </div>

        <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>Asset Code</th>
                <th>Name</th>
                <th>Brand</th>
                <th>Model</th>
                <th>Category</th>
                <th>Vendor</th>
                <th>Status</th>
                <th>Condition</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="asset : ${assets}">
                <td th:text="${asset.assetId}"></td>
                <td th:text="${asset.assetCode}"></td>
                <td th:text="${asset.assetName}"></td>
                <td th:text="${asset.brand}"></td>
                <td th:text="${asset.model}"></td>
                <td th:text="${asset.category != null ? asset.category.categoryName : 'N/A'}"></td>
                <td th:text="${asset.vendor != null ? asset.vendor.vendorName : 'N/A'}"></td>
                <td><span class="status-badge badge-success" th:text="${asset.assetStatus}"></span></td>
                <td><span class="status-badge badge-warning" th:text="${asset.conditionStatus}"></span></td>

                <td class="text-end">
                    <a th:href="@{'/ui/assets/edit/' + ${asset.assetId}}" class="btn btn-sm btn-outline-primary">
                        <i class="bi bi-pencil"></i>
                    </a>

                    <a th:href="@{'/ui/assets/delete/' + ${asset.assetId}}"
                       class="btn btn-sm btn-outline-danger"
                       onclick="return confirm('Are you sure you want to delete this asset?')">
                        <i class="bi bi-trash"></i>
                    </a>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(assets)}">
                <td colspan="10" class="text-center text-muted py-4">No assets found.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</div>
<script th:src="@{/js/common.js}"></script>
</body>
</html>
