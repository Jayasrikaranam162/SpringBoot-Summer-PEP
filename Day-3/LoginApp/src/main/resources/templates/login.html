<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>
<div class="card">
    <h2>Login</h2>

    <!-- Error message -->
    <div class="error-box" th:if="${error}" th:text="${error}"></div>

    <form action="/login" method="post">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username"
                   placeholder="Only letters, no spaces" maxlength="50" required />
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password"
                   placeholder="Min 4, Max 16 characters" maxlength="16" required />
        </div>
        <button type="submit">Login</button>
    </form>

    <div class="hint">
        <strong>Password rules:</strong><br>
        • 4–16 characters<br>
        • At least 1 uppercase letter (A-Z)<br>
        • At least 1 number (0-9)<br>
        • At least 1 special character (!@#$%...)
    </div>
</div>
</body>
</html>
